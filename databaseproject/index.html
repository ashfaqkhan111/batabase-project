<!DOCTYPE html>
<html>
    <head>
        <title>Login</title>
        <h1>Login</h1>
        <link rel="stylesheet" href="style.css">
    </head>
    <main>
        <body>
            <section>
                <form class="loginform" action="">
                    <div>
                    <label for="lid"> Librarian ID</label>
                    <input type="text" name="lid" id="lid" placeholder="Li0000000002" required>
                </div>
                <div>
                    <label for="name">Name</label>
                    <input type="text" name="name" id="name" placeholder="jhon" required>
                </div>
                <div>
                    <label for="pass">Password</label>
                    <input type="password" name="pass" placeholder="*********" required>
                </div>

                <div>
                    <button type="submit">Login</button>
                </div>

                </form>
                
            </section>
        </body>
    </main>
</html>
