<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register Member</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h1>Register Member</h1>
    
    <main>
        <section>
            <!-- Form points to the PHP file we will create below -->
            <form class="loginform" action="register.php" method="POST">
                
                <div>
                    <label for="member_id">Member ID</label>
                    <input type="text" name="member_id" id="member_id" placeholder="M001" required>
                </div>
                
                <div>
                    <label for="member_name">Full Name</label>
                    <input type="text" name="member_name" id="member_name" placeholder="John Doe" required>
                </div>
                
                <div>
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" placeholder="john@example.com" required>
                </div>

                <div>
                    <label for="phone">Phone Number</label>
                    <input type="text" name="phone" id="phone" placeholder="081234567890" required>
                </div>

                <div>
                    <label for="address">Address</label>
                    <input type="text" name="address" id="address" placeholder="123 Main St" required>
                </div>

                <div>
                    <label for="gender">Gender</label>
                    <select name="gender" id="gender" required style="margin-bottom: 10px; width: 324px; padding: 10px; border-radius: 7px; border: 1px solid black;">
                        <option value="" disabled selected>Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>

                <div>
                    <button type="submit">Register Member</button>
                </div>

                <div style="text-align: center; margin-top: 20px;">
                    <a href="dashbord.html" style="color: black; font-size: 14px; text-decoration: none; font-weight: bold;">
                        Back to Dashboard
                    </a>
                </div>

            </form>
        </section>
    </main>

</body>
</html>
